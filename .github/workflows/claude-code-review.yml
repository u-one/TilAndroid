name: Claude Code Review（コードレビュー）

on:
  pull_request:
    types: [opened, synchronize]
    # オプション: 特定のファイル変更時のみ実行（Android/Kotlinファイル）
    # paths:
    #   - "app/**/*.kt"
    #   - "**/src/**/*.kt"
    #   - "**/*.gradle.kts"
    #   - "**/build.gradle"

jobs:
  claude-review:
    # オプション: PR作成者でフィルタリング
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Reviewを実行
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # オプション: モデルを指定（デフォルトはClaude Sonnet 4、Claude Opus 4を使用する場合はコメントアウトを外す）
          # model: "claude-opus-4-20250514"
          
          # Android/Kotlin開発用の自動レビュープロンプト（@claudeの言及は不要）
          direct_prompt: |
            このAndroid/Kotlin pull requestをレビューし、以下の点についてフィードバックを提供してください：
            - Android開発のベストプラクティスとKotlinコーディング規約
            - Jetpack ComposeのUI設計とパフォーマンス
            - MVVMアーキテクチャと状態管理
            - メモリリークやパフォーマンスの問題
            - セキュリティと権限管理
            - テストカバレッジとCompose UIテスト
            - Gradle設定とビルド最適化
            
            Android開発経験を活かした建設的で実用的なフィードバックをお願いします。

          # オプション: 同じPRへの後続のプッシュでClaudeが同じコメントを再利用するためのスティッキーコメントを使用
          # use_sticky_comment: true
          
          # オプション: Android/Kotlinファイルタイプに基づいたレビューのカスタマイズ
          # direct_prompt: |
          #   このAndroid PRを以下の点に焦点を当ててレビューしてください：
          #   - Kotlinファイル: null安全性、data classの使用、コルーチンの適切な使用
          #   - Compose UI: 再構成の最適化、状態管理、メモ化の適用
          #   - ViewModel: 状態管理、ライフサイクル、メモリリーク防止
          #   - Repository/DataSource: 非同期処理、エラーハンドリング、データキャッシュ
          #   - テスト: JUnit 5、Compose UIテスト、MockKの使用
          
          # オプション: 異なる作成者用の異なるプロンプト
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' && 
          #   'ようこそ！初回貢献者のPRをレビューしてください。奨励的で、提案に対して詳細な説明を提供してください。' ||
          #   'コーディング規約とベストプラクティスに焦点を当てた徹底的なコードレビューを提供してください。' }}
          
          # オプション: Androidビルドやテスト実行用の特定ツールを追加
          # allowed_tools: "Bash(./gradlew test),Bash(./gradlew spotlessCheck),Bash(./gradlew assembleDebug),Bash(./gradlew connectedAndroidTest)"
          
          # オプション: 特定の条件でレビューをスキップ
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')

