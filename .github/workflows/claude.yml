name: Claude Code（コード支援）

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # PRでClaudeがCI結果を読み取るために必要
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Codeを実行
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # これはPRでClaudeがCI結果を読み取ることを許可するオプション設定です
          additional_permissions: |
            actions: read
          
          # オプション: モデルを指定（デフォルトはClaude Sonnet 4、Claude Opus 4を使用する場合はコメントアウトを外す）
          # model: "claude-opus-4-20250514"
          
          # オプション: トリガーフレーズをカスタマイズ（デフォルト: @claude）
          # trigger_phrase: "/claude"
          
          # オプション: 特定のユーザーがissueにアサインされた際にトリガー
          # assignee_trigger: "claude-bot"
          
          # オプション: Claudeが実行できる特定のコマンドを許可（Android開発用）
          # allowed_tools: "Bash(./gradlew:*),Bash(./gradlew assembleDebug),Bash(./gradlew test),Bash(./gradlew spotlessApply),Bash(./gradlew spotlessCheck)"
          
          # オプション: Android/Kotlin開発用にClaudeの動作をカスタマイズするための指示を追加
          # custom_instructions: |
          #   このプロジェクトはJetpack Composeを使用したAndroidアプリです
          #   コーディング規約に従い、Spotlessでコードフォーマットを適用してください
          #   新しいKotlinコードには適切なテストを追加してください
          #   Android開発のベストプラクティスに従ってください
          #   MVVM + Composeアーキテクチャパターンを使用してください
          
          # オプション: Android開発用のカスタム環境変数
          # claude_env: |
          #   ANDROID_HOME: /usr/local/lib/android/sdk

